<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览 C · 经典博客双栏风</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fbfbfd; --sidebar: #2b2d42; --text: #2b2d42; --muted: #6b7280;
            --border: #e5e7eb; --accent: #4f46e5; --card:#fff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'Inter','Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; -webkit-font-smoothing:antialiased; }
        .preview-banner { background:#2b2d42; color:#fff; text-align:center; padding:10px; font-size:.9rem; font-weight:600; }
        .layout { display:grid; grid-template-columns:300px 1fr; min-height:100vh; }

        /* Sidebar */
        .sidebar {
            background:var(--sidebar); color:#e5e7eb; padding:48px 32px; position:sticky; top:0; height:100vh;
            display:flex; flex-direction:column;
        }
        .avatar { width:120px; height:120px; border-radius:50%; background:linear-gradient(135deg,#4f46e5,#06b6d4); margin:0 auto 20px; display:flex; align-items:center; justify-content:center; }
        .avatar svg { width:56px; height:56px; color:#fff; opacity:.85; }
        .sidebar h1 { font-size:1.5rem; text-align:center; margin-bottom:6px; color:#fff; }
        .sidebar .role { text-align:center; color:#a5b4fc; font-size:.95rem; margin-bottom:24px; }
        .sidebar .bio { font-size:.9rem; color:#c7cad1; text-align:center; margin-bottom:28px; line-height:1.7; }
        .sidebar nav { display:flex; flex-direction:column; gap:4px; }
        .sidebar nav a { color:#c7cad1; text-decoration:none; padding:10px 14px; border-radius:8px; font-size:.95rem; font-weight:500; transition:all .2s; }
        .sidebar nav a:hover { background:rgba(255,255,255,.08); color:#fff; }
        .sidebar .social { margin-top:auto; display:flex; gap:16px; justify-content:center; padding-top:24px; }
        .sidebar .social a { color:#a5b4fc; }
        .sidebar .social svg { width:20px; height:20px; }
        .lang-btn { margin:24px auto 0; border:1px solid rgba(255,255,255,.2); background:none; color:#c7cad1; border-radius:8px; padding:6px 14px; cursor:pointer; font-size:.85rem; font-weight:600; font-family:inherit; }

        /* Content */
        .content { padding:56px 64px; max-width:760px; }
        .content h2 { font-size:1.6rem; margin-bottom:24px; padding-bottom:12px; border-bottom:2px solid var(--border); }
        .article-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; text-decoration:none; color:inherit; display:block; transition:all .2s; box-shadow:0 1px 3px rgba(0,0,0,.04); }
        .article-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); transform:translateY(-2px); }
        .article-card .date { color:var(--accent); font-size:.85rem; font-weight:600; margin-bottom:8px; }
        .article-card h3 { font-size:1.2rem; margin-bottom:8px; }
        .article-card p { color:var(--muted); font-size:.95rem; }
        .section2 { margin-top:48px; }
        .proj-item { padding:16px 0; border-bottom:1px solid var(--border); }
        .proj-item h4 { font-size:1.05rem; margin-bottom:4px; }
        .proj-item p { color:var(--muted); font-size:.92rem; }
        @media (max-width:820px){ .layout{grid-template-columns:1fr;} .sidebar{position:static;height:auto;} .content{padding:32px 24px;} }
    </style>
</head>
<body>
    <div class="preview-banner"><span data-en="🎨 Style Preview C · Classic Blog Sidebar" data-zh="🎨 风格预览 C · 经典博客双栏风">🎨 风格预览 C · 经典博客双栏风</span></div>
    <div class="layout">
        <aside class="sidebar">
            <div class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <h1 data-en="Your Name" data-zh="你的名字">你的名字</h1>
            <div class="role" data-en="Software Engineer" data-zh="软件工程师">软件工程师</div>
            <p class="bio" data-en="A short bio about you and what you write about on this blog." data-zh="一句简短介绍：关于你，以及你在这个博客里会写些什么。">一句简短介绍：关于你，以及你在这个博客里会写些什么。</p>
            <nav>
                <a href="#" data-en="🏠 Home" data-zh="🏠 首页">🏠 首页</a>
                <a href="#posts" data-en="📝 Posts" data-zh="📝 文章">📝 文章</a>
                <a href="#projects" data-en="💼 Projects" data-zh="💼 项目">💼 项目</a>
                <a href="#about" data-en="👤 About" data-zh="👤 关于">👤 关于</a>
            </nav>
            <button class="lang-btn" id="lang-toggle">中 / EN</button>
            <div class="social">
                <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg></a>
                <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></a>
            </div>
        </aside>
        <main class="content">
            <h2 id="posts" data-en="Latest Posts" data-zh="最新文章">最新文章</h2>
            <a href="#" class="article-card">
                <div class="date">2026-07-10</div>
                <h3 data-en="Hello World — My First Post" data-zh="Hello World —— 我的第一篇文章">Hello World —— 我的第一篇文章</h3>
                <p data-en="A sample article showing how posts look and how to add your own." data-zh="一篇示例文章，展示文章的样子以及如何添加你自己的文章。">一篇示例文章，展示文章的样子以及如何添加你自己的文章。</p>
            </a>
            <a href="#" class="article-card">
                <div class="date">2026-06-22</div>
                <h3 data-en="Thoughts on building side projects" data-zh="关于做副业项目的一些思考">关于做副业项目的一些思考</h3>
                <p data-en="Notes and lessons from shipping small products on the side." data-zh="做副业小产品过程中的一些笔记和经验教训。">做副业小产品过程中的一些笔记和经验教训。</p>
            </a>
            <div class="section2">
                <h2 id="projects" data-en="Projects" data-zh="项目">项目</h2>
                <div class="proj-item"><h4 data-en="Project One" data-zh="项目一">项目一</h4><p data-en="Short description." data-zh="简短描述。">简短描述。</p></div>
                <div class="proj-item"><h4 data-en="Project Two" data-zh="项目二">项目二</h4><p data-en="Short description." data-zh="简短描述。">简短描述。</p></div>
            </div>
        </main>
    </div>
    <script>
        const LANG_KEY='preferred-lang';
        function applyLanguage(l){document.querySelectorAll('[data-en][data-zh]').forEach(e=>e.innerHTML=e.getAttribute('data-'+l));document.documentElement.lang=l==='zh'?'zh-CN':'en';localStorage.setItem(LANG_KEY,l);}
        let lang=localStorage.getItem(LANG_KEY)||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');applyLanguage(lang);
        document.getElementById('lang-toggle').addEventListener('click',()=>{const c=localStorage.getItem(LANG_KEY)||'zh';applyLanguage(c==='zh'?'en':'zh');});
    </script>
</body>
</html>
