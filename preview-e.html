<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览 E · 杂志作品集风</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#faf8f5; --text:#1a1a1a; --muted:#6b6b6b; --border:#e0dcd4; --accent:#c2410c; --card:#fff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'Inter','Noto Serif SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; -webkit-font-smoothing:antialiased; }
        .serif { font-family:'Fraunces','Noto Serif SC',serif; }
        .preview-banner { background:var(--accent); color:#fff; text-align:center; padding:10px; font-size:.9rem; font-weight:600; }
        .wrap { max-width:1080px; margin:0 auto; padding:0 32px; }
        header { display:flex; justify-content:space-between; align-items:center; padding:32px 0; border-bottom:1px solid var(--border); }
        .brand { font-family:'Fraunces',serif; font-weight:900; font-size:1.4rem; }
        header nav a { color:var(--text); text-decoration:none; margin-left:28px; font-size:.95rem; }
        header nav a:hover { color:var(--accent); }
        .lang-btn { border:1px solid var(--border); background:none; color:var(--muted); border-radius:6px; padding:6px 12px; margin-left:28px; cursor:pointer; font-size:.85rem; font-weight:600; font-family:inherit; }

        .hero { padding:80px 0 60px; display:grid; grid-template-columns:1.2fr 1fr; gap:60px; align-items:center; }
        .hero h1 { font-family:'Fraunces','Noto Serif SC',serif; font-size:clamp(2.6rem,5vw,4.4rem); font-weight:900; line-height:1.05; letter-spacing:-0.02em; margin-bottom:24px; }
        .hero .lead { font-size:1.2rem; color:var(--muted); }
        .hero-img { aspect-ratio:4/5; border-radius:12px; background:linear-gradient(135deg,#f3d9c4,#c2410c 140%); display:flex; align-items:center; justify-content:center; }
        .hero-img svg { width:80px; height:80px; color:rgba(255,255,255,.6); }

        section { padding:60px 0; border-top:1px solid var(--border); }
        .eyebrow { text-transform:uppercase; letter-spacing:.15em; font-size:.78rem; color:var(--accent); font-weight:700; margin-bottom:12px; }
        h2 { font-family:'Fraunces','Noto Serif SC',serif; font-size:2.2rem; font-weight:600; margin-bottom:36px; }

        .feature-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:32px; }
        .feature { text-decoration:none; color:inherit; }
        .feature .thumb { aspect-ratio:16/10; border-radius:10px; margin-bottom:16px; background:linear-gradient(135deg,#e7e2d8,#cfc7b8); transition:transform .3s; }
        .feature:hover .thumb { transform:scale(1.02); }
        .feature h3 { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:600; margin-bottom:6px; }
        .feature p { color:var(--muted); font-size:.98rem; }

        .post-list a { display:flex; justify-content:space-between; align-items:baseline; padding:20px 0; border-bottom:1px solid var(--border); text-decoration:none; color:inherit; gap:24px; }
        .post-list a:hover .pt { color:var(--accent); }
        .post-list .pt { font-family:'Fraunces',serif; font-size:1.3rem; font-weight:600; }
        .post-list .pd { color:var(--muted); font-size:.9rem; white-space:nowrap; }
        footer { padding:50px 0; color:var(--muted); font-size:.9rem; border-top:1px solid var(--border); }
        @media (max-width:820px){ .hero{grid-template-columns:1fr;} .hero-img{max-width:320px;} .feature-grid{grid-template-columns:1fr;} header nav a{display:none;} }
    </style>
</head>
<body>
    <div class="preview-banner"><span data-en="🎨 Style Preview E · Editorial / Magazine" data-zh="🎨 风格预览 E · 杂志作品集风">🎨 风格预览 E · 杂志作品集风</span></div>
    <div class="wrap">
        <header>
            <div class="brand">Your Name</div>
            <nav>
                <a href="#work" data-en="Work" data-zh="作品">作品</a>
                <a href="#journal" data-en="Journal" data-zh="随笔">随笔</a>
                <a href="#about" data-en="About" data-zh="关于">关于</a>
                <button class="lang-btn" id="lang-toggle">中 / EN</button>
            </nav>
        </header>

        <div class="hero">
            <div>
                <h1 data-en="Designer, developer & storyteller." data-zh="设计者、开发者，也是讲故事的人。">设计者、开发者，也是讲故事的人。</h1>
                <p class="lead" data-en="I craft thoughtful digital experiences and write about the process." data-zh="我打造有温度的数字体验，并记录下这个过程。">我打造有温度的数字体验，并记录下这个过程。</p>
            </div>
            <div class="hero-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </div>

        <section id="work">
            <div class="eyebrow" data-en="Selected Work" data-zh="精选作品">精选作品</div>
            <h2 data-en="Projects" data-zh="项目">项目</h2>
            <div class="feature-grid">
                <a class="feature" href="#"><div class="thumb"></div><h3 data-en="Project One" data-zh="项目一">项目一</h3><p data-en="A short description of the project." data-zh="项目的简短描述。">项目的简短描述。</p></a>
                <a class="feature" href="#"><div class="thumb"></div><h3 data-en="Project Two" data-zh="项目二">项目二</h3><p data-en="A short description of the project." data-zh="项目的简短描述。">项目的简短描述。</p></a>
            </div>
        </section>

        <section id="journal">
            <div class="eyebrow" data-en="From the journal" data-zh="来自随笔">来自随笔</div>
            <h2 data-en="Writing" data-zh="文章">文章</h2>
            <div class="post-list">
                <a href="#"><span class="pt" data-en="Hello World — My First Post" data-zh="Hello World —— 我的第一篇文章">Hello World —— 我的第一篇文章</span><span class="pd">2026-07-10</span></a>
                <a href="#"><span class="pt" data-en="Thoughts on building side projects" data-zh="关于做副业项目的一些思考">关于做副业项目的一些思考</span><span class="pd">2026-06-22</span></a>
                <a href="#"><span class="pt" data-en="What I learned this year" data-zh="今年我学到的东西">今年我学到的东西</span><span class="pd">2026-05-01</span></a>
            </div>
        </section>

        <section id="about">
            <div class="eyebrow" data-en="About" data-zh="关于">关于</div>
            <h2 data-en="A little about me" data-zh="关于我">关于我</h2>
            <p style="font-size:1.15rem; max-width:640px;" data-en="A short paragraph about you — your background, interests, and what you're focused on right now." data-zh="一段关于你的简短介绍——你的背景、兴趣，以及你目前专注的方向。">一段关于你的简短介绍——你的背景、兴趣，以及你目前专注的方向。</p>
        </section>

        <footer><span data-en="© 2026 Your Name" data-zh="© 2026 你的名字">© 2026 你的名字</span></footer>
    </div>
    <script>
        const LANG_KEY='preferred-lang';
        function applyLanguage(l){document.querySelectorAll('[data-en][data-zh]').forEach(e=>e.innerHTML=e.getAttribute('data-'+l));document.documentElement.lang=l==='zh'?'zh-CN':'en';localStorage.setItem(LANG_KEY,l);}
        let lang=localStorage.getItem(LANG_KEY)||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');applyLanguage(lang);
        document.getElementById('lang-toggle').addEventListener('click',()=>{const c=localStorage.getItem(LANG_KEY)||'zh';applyLanguage(c==='zh'?'en':'zh');});
    </script>
</body>
</html>
