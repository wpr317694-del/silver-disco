<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览 B · 炫酷便当网格风</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #111113;
            --card-hover: #16161a;
            --border: #26262b;
            --text: #f5f5f7;
            --muted: #8a8a94;
            --accent: #7c5cff;
            --accent2: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .preview-banner {
            background: linear-gradient(90deg, #7c5cff, #06b6d4); color: #fff; text-align: center;
            padding: 10px; font-size: .9rem; font-weight: 600;
        }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 28px 0;
        }
        .brand { font-weight: 800; font-size: 1.2rem; }
        header nav a { color: var(--muted); text-decoration: none; margin-left: 24px; font-size: .95rem; font-weight: 500; }
        header nav a:hover { color: var(--text); }
        .lang-btn { border: 1px solid var(--border); background: var(--card); color: var(--muted); border-radius: 8px; padding: 6px 12px; margin-left: 24px; cursor: pointer; font-size: .85rem; font-weight: 600; font-family: inherit; }

        .hero { padding: 50px 0 40px; text-align: center; }
        .hero h1 {
            font-size: clamp(2.4rem, 6vw, 4.5rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1.05;
            background: linear-gradient(135deg, #fff 30%, #7c5cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 18px;
        }
        .hero p { color: var(--muted); font-size: 1.2rem; max-width: 560px; margin: 0 auto; }

        /* Bento grid */
        .bento {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 40px 0;
        }
        .box {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px;
            transition: all .25s; position: relative; overflow: hidden; text-decoration: none; color: inherit;
        }
        .box:hover { background: var(--card-hover); border-color: #3a3a44; transform: translateY(-3px); }
        .box h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .box p { color: var(--muted); font-size: .92rem; }
        .box .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 14px; font-weight: 700; }
        .col-2 { grid-column: span 2; }
        .col-4 { grid-column: span 4; }
        .row-2 { grid-row: span 2; }
        .big-num { font-size: 2.6rem; font-weight: 800; background: linear-gradient(135deg,#7c5cff,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .glow { position:absolute; width:200px; height:200px; border-radius:50%; background: radial-gradient(circle, rgba(124,92,255,.25), transparent 70%); top:-60px; right:-40px; pointer-events:none; }
        .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
        .chip { background: rgba(124,92,255,.12); color:#b9a8ff; border-radius:20px; padding:5px 12px; font-size:.82rem; font-weight:500; }
        .postrow { display:flex; justify-content:space-between; padding:10px 0; border-top:1px solid var(--border); }
        .postrow:first-of-type { border-top:none; }
        .postrow .d { color: var(--muted); font-size:.85rem; }
        footer { padding: 40px 0; color: var(--muted); text-align:center; font-size:.9rem; }
        @media (max-width: 800px) { .bento { grid-template-columns: repeat(2,1fr); } .col-4{grid-column:span 2;} .col-2{grid-column:span 2;} header nav a{display:none;} }
    </style>
</head>
<body>
    <div class="preview-banner"><span data-en="🎨 Style Preview B · Bento Grid (dark & flashy)" data-zh="🎨 风格预览 B · 炫酷便当网格风">🎨 风格预览 B · 炫酷便当网格风</span></div>
    <div class="wrap">
        <header>
            <div class="brand">Your Name</div>
            <nav>
                <a href="#" data-en="Work" data-zh="作品">作品</a>
                <a href="#" data-en="Blog" data-zh="文章">文章</a>
                <a href="#" data-en="About" data-zh="关于">关于</a>
                <button class="lang-btn" id="lang-toggle">中 / EN</button>
            </nav>
        </header>

        <div class="hero">
            <h1 data-en="Building things,<br>one project at a time." data-zh="用心打造，<br>一次一个项目。">用心打造，<br>一次一个项目。</h1>
            <p data-en="Full-stack developer crafting delightful digital experiences." data-zh="全栈开发者，专注打造出色的数字体验。">全栈开发者，专注打造出色的数字体验。</p>
        </div>

        <div class="bento">
            <a class="box col-2 row-2" href="#">
                <div class="glow"></div>
                <div class="label" data-en="Featured Project" data-zh="精选项目">精选项目</div>
                <h3 data-en="Project One" data-zh="项目一">项目一</h3>
                <p data-en="Your flagship project — a longer description of what makes it special and the tech behind it." data-zh="你的旗舰项目——用更长的篇幅描述它的亮点和背后的技术栈。">你的旗舰项目——用更长的篇幅描述它的亮点和背后的技术栈。</p>
                <div class="chips"><span class="chip">React</span><span class="chip">Node.js</span><span class="chip">PostgreSQL</span></div>
            </a>
            <div class="box col-2">
                <div class="big-num">3+</div>
                <p data-en="Years of experience" data-zh="年开发经验">年开发经验</p>
            </div>
            <a class="box" href="#">
                <h3 data-en="Project Two" data-zh="项目二">项目二</h3>
                <p data-en="Short description." data-zh="简短描述。">简短描述。</p>
            </a>
            <a class="box" href="#">
                <h3 data-en="Project Three" data-zh="项目三">项目三</h3>
                <p data-en="Short description." data-zh="简短描述。">简短描述。</p>
            </a>
            <a class="box col-2" href="#">
                <div class="label" data-en="Latest Writing" data-zh="最新文章">最新文章</div>
                <div class="postrow"><span data-en="Hello World" data-zh="Hello World">Hello World</span><span class="d">07-10</span></div>
                <div class="postrow"><span data-en="On side projects" data-zh="关于副业项目">关于副业项目</span><span class="d">06-22</span></div>
                <div class="postrow"><span data-en="What I learned" data-zh="我的学习心得">我的学习心得</span><span class="d">05-01</span></div>
            </a>
            <div class="box col-2">
                <div class="label" data-en="Stack" data-zh="技术栈">技术栈</div>
                <div class="chips"><span class="chip">JS</span><span class="chip">TS</span><span class="chip">Python</span><span class="chip">Go</span><span class="chip">Docker</span><span class="chip">AWS</span></div>
            </div>
            <div class="box col-4">
                <div class="label" data-en="About" data-zh="关于">关于</div>
                <p data-en="A short paragraph about you — your background, interests, and what you're focused on right now." data-zh="一段关于你的简短介绍——你的背景、兴趣，以及你目前专注的方向。">一段关于你的简短介绍——你的背景、兴趣，以及你目前专注的方向。</p>
            </div>
        </div>
        <footer><span data-en="© 2026 Your Name" data-zh="© 2026 你的名字">© 2026 你的名字</span></footer>
    </div>
    <script>
        const LANG_KEY='preferred-lang';
        function applyLanguage(l){document.querySelectorAll('[data-en][data-zh]').forEach(e=>e.innerHTML=e.getAttribute('data-'+l));document.documentElement.lang=l==='zh'?'zh-CN':'en';localStorage.setItem(LANG_KEY,l);}
        let lang=localStorage.getItem(LANG_KEY)||((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en');applyLanguage(lang);
        document.getElementById('lang-toggle').addEventListener('click',()=>{const c=localStorage.getItem(LANG_KEY)||'zh';applyLanguage(c==='zh'?'en':'zh');});
    </script>
</body>
</html>
